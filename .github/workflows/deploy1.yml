name: Deploy to Production

on:
  push:
    branches:
      - main # Yoki master, asosiy branchni yozing

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Serverga ulanish va Deploy qilish
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /var/www/todo
            chmod +x deploy.sh
            ./deploy.sh