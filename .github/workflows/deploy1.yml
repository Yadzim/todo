name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }} # Yoki to'g'ridan to'g'ri 169.58.30.176
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          request_pty: true # <--- ASOSIY YECHIM: Haqiqiy terminal (ekran) simulyatsiyasini yoqadi
          script: |
            # Profilni yuklash (foydali muhit o'zgaruvchilari uchun)
            source ~/.profile || true
            source ~/.bashrc || true

            # Loyihaga o'tish va ishga tushirish
            cd /var/www/todo
            bash ./deploy.sh