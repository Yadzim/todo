name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          request_pty: true # <--- ASOSIY YECHIM: Haqiqiy terminal (ekran) simulyatsiyasini yoqadi
          script: |
            cd /var/www/todo
            ./deploy.sh