name: Native SSH Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          cat > ~/.ssh/id_ed25519 << 'EOF'
          ${{ secrets.SSH_KEY }}
          EOF
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts

      - name: Test
        run: |
          ssh -vvv \
            -i ~/.ssh/id_ed25519 \
            -p ${{ secrets.PORT }} \
            ${{ secrets.USERNAME }}@${{ secrets.HOST }} \
            "hostname && whoami && pwd && touch /tmp/github-test && echo OK"
